{% extends 'base.html' %}
{% load static %}

{% block title %}Criar Movimento Bancário - Sistema Estelar{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h4><i class="fas fa-university"></i> Criar Movimento Bancário</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Data *</label>
                        <input type="date" name="data" class="form-control" required value="{{ request.GET.data|default:'' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tipo *</label>
                        <select name="tipo" class="form-select" required>
                            <option value="">Selecione...</option>
                            {% for value, label in tipos %}
                            <option value="{{ value }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Valor (R$) *</label>
                        <input type="number" name="valor" class="form-control" step="0.01" min="0" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nº Documento/Extrato</label>
                        <input type="text" name="numero_documento" class="form-control" maxlength="50">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Receita da Empresa (opcional)</label>
                        <select name="receita_empresa" class="form-select">
                            <option value="">Nenhuma</option>
                            {% for receita in receitas %}
                            <option value="{{ receita.pk }}">{{ receita.get_tipo_receita_display }} - R$ {{ receita.valor }} - {{ receita.data|date:"d/m/Y" }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12 mb-3">
                        <label class="form-label">Descrição *</label>
                        <textarea name="descricao" class="form-control" rows="3" required></textarea>
                    </div>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="{% url 'notas:dashboard_fluxo_caixa' %}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
