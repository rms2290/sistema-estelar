[pytest]
# Configuração do pytest para Django

# Django settings module
DJANGO_SETTINGS_MODULE = sistema_estelar.settings

# Diretórios onde procurar testes
testpaths = notas/tests

# Padrões de arquivos de teste
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Opções padrão
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --reuse-db
    --nomigrations
    --cov=notas
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=0

# Marcadores customizados
markers =
    slow: marca testes que demoram para executar
    integration: marca testes de integração
    unit: marca testes unitários
    model: marca testes de modelos
    view: marca testes de views
    form: marca testes de formulários
    service: marca testes de serviços

# Configurações de log
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout para testes (em segundos)
timeout = 300

# Ignorar avisos específicos
filterwarnings =
    ignore::django.utils.deprecation.RemovedInDjango60Warning
    ignore::DeprecationWarning

